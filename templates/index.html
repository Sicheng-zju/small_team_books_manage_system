{% extends 'base.html' %}

{% block content %}
<div class="book-list">
    {% if books %}
        {% for book in books %}
        <div class="book-card">
            <div class="book-icon">
                {% if book.filetype == 'pdf' %}
                    📄 PDF
                {% elif book.filetype == 'epub' %}
                    📖 EPUB
                {% else %}
                    📝 TXT
                {% endif %}
            </div>
            <div class="book-info">
                <h3><a href="{{ url_for('read_book', book_id=book.id) }}">{{ book.title }}</a></h3>
                <span class="badge">{{ book.filetype }}</span>
            </div>
            <div class="book-actions">
                <a href="{{ url_for('read_book', book_id=book.id) }}" class="btn">阅读</a>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <p class="no-books">没有找到书籍。</p>
    {% endif %}
</div>
{% endblock %}
