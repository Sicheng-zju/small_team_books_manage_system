{% extends 'base.html' %}

{% block title %}{{ book.title }} - 阅读{% endblock %}

{% block head %}
<script src="{{ url_for('static', filename='js/jszip.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/epub.min.js') }}"></script>
<style>
    #viewer {
        height: 80vh;
        width: 100%;
        box-shadow: 0 0 10px #ccc;
        background: white;
    }
    .controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="controls">
    <a href="{{ url_for('index') }}" class="btn">&larr; 返回列表</a>
    <span>{{ book.title }}</span>
    <div id="pagination"></div>
</div>

<div id="viewer"></div>

<div style="display: flex; justify-content: space-between; margin-top: 1rem;">
    <button id="prev" class="btn">上一页</button>
    <button id="next" class="btn">下一页</button>
</div>

<script>
    var book = ePub("{{ url_for('serve_book', filename=book.filename) }}");
    var rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        flow: "scrolled-doc" // or "paginated"
    });

    var bookId = "book_progress_{{ book.id }}";
    var savedCfi = localStorage.getItem(bookId);

    if (savedCfi) {
        rendition.display(savedCfi);
    } else {
        rendition.display();
    }

    rendition.on("relocated", function(location) {
        localStorage.setItem(bookId, location.start.cfi);
    });

    document.getElementById("next").addEventListener("click", function() {
        rendition.next();
    });

    document.getElementById("prev").addEventListener("click", function() {
        rendition.prev();
    });

    // Keyboard navigation
    document.addEventListener("keyup", function(e) {
        if ((e.keyCode || e.which) == 37) {
            rendition.prev();
        }
        if ((e.keyCode || e.which) == 39) {
            rendition.next();
        }
    });
</script>
{% endblock %}
